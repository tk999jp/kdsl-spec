name: Phase 9D Schema Sync

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'phase9d-binding-schema'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: phase9d-binding-schema
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Apply canonical alignment
        run: python tools/validator/tmp_phase9d_schema_patch.py
      - name: Validate repository
        run: python tools/validator/run_all_samples.py
      - name: Store synchronized schema candidate
        run: |
          rm .github/workflows/phase9d-schema-sync.yml
          rm tools/validator/tmp_phase9d_schema_patch.py
          rm .phase9d-trigger
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Spec: align Phase 9D binding evidence schema"
          git push origin HEAD:phase9d-binding-schema
