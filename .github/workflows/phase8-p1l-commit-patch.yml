name: Phase 8 P1L Shared AST Commit Patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/kdsl-phase8-p1l-shared-ast
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply and correct bounded Phase 8 patch
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/phase8-p1l-finalize-patch.yml')
          text = source.read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "          PY\n"
          start = text.index(start_marker) + len(start_marker)
          end = text.index(end_marker, start)
          lines = text[start:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          exec(compile(script, str(source), 'exec'), {'__name__': '__main__'})

          runner = Path('tools/validator/run_p1_shared_ast_samples.py')
          content = runner.read_text(encoding='utf-8')
          broken = "scope + '\n' + scope"
          fixed = "scope + '\\n' + scope"
          if content.count(broken) != 1:
              raise SystemExit('expected one generated newline-literal defect, found ' + str(content.count(broken)))
          runner.write_text(content.replace(broken, fixed, 1), encoding='utf-8')

          for workflow in Path('.github/workflows').glob('phase8-p1l-*.yml'):
              workflow.unlink()
          PY

      - name: Run targeted compatibility checks
        run: |
          python tools/validator/run_p1_shared_ast_samples.py
          python tools/validator/run_p1_contract_samples.py
          python tools/validator/run_packet_p1_normalization_samples.py

      - name: Commit branch patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Validator: integrate P1L into shared AST v2"
          git push origin HEAD:agent/kdsl-phase8-p1l-shared-ast
