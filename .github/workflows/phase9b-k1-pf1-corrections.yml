name: Phase 9B K1 PF1 Corrections

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  correct:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/kdsl-phase9b-k1-pf1-schema
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply bounded schema corrections
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one replacement, found {count}: {old!r}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'spec/runtime/kdsl-runtime-control-canonicalization.md',
              '''The digest is computed over the canonical JSON bytes, not over the Markdown/YAML source bytes.

## 4. Identity record''',
              '''The digest is computed over the canonical JSON bytes, not over the Markdown/YAML source bytes.

### 3.1 Self-digest substitution

`IDENTITY.digest` is required in the stored instance but must not be hashed as its stored value.

Digest computation uses a deterministic substitution:

```text
1. construct the complete schema-ordered semantic projection
2. replace only IDENTITY.digest with the fixed string `sha256:SELF`
3. serialize canonical JSON
4. UTF-8 encode
5. compute SHA-256
6. store `sha256:<computed lowercase hex>` in IDENTITY.digest
```

Validation repeats the same substitution and compares the computed digest with the stored digest.

```text
stored digest included as-is in digest inputâ†’prohibited
stored digest=`sha256:SELF`â†’blocked
other fields excluded to avoid recursionâ†’prohibited
```

This substitution removes self-reference without excluding the `IDENTITY.digest` key from the canonical field structure.

## 4. Identity record''',
          )
          replace_once(
              'spec/runtime/kdsl-runtime-control-canonicalization.md',
              '''Digest mismatch, unsupported canonicalization ID, unknown field, or duplicate field results in `blocked`.''',
              '''Digest mismatch, unsupported canonicalization ID, invalid self-digest substitution, unknown field, or duplicate field results in `blocked`.''',
          )

          replace_once(
              'spec/runtime/kdsl-k1-runtime-kernel-schema.md',
              '''Validity requires exact operation/scope match, current time validity, and `revoked:false`.

```text
remembered conversation approvalâ†’invalid
approval reference valid != executable
digest match != issuer authenticity proof
```

Cryptographic signer authentication is outside v0.1 draft.''',
              '''Approval handling separates structural integrity from trusted-source acceptance.

Structural validity requires:

```text
exact operation/scope match
current time validity
revoked:false
digest recomputation match
```

Authority sufficiency additionally requires trusted-source verification of the issuer/source under an explicit repository/project trust policy or immutable platform record.

```text
remembered conversation approvalâ†’invalid
structurally valid approval without trusted-source verificationâ†’blocked
approval accepted != executable
digest match != issuer authenticity proof
```

Cryptographic signer authentication is outside v0.1 draft. When no independently trusted source can verify issuer identity, the approval requirement remains unsatisfied and authority is `blocked`.''',
          )

          replace_once(
              'spec/runtime/kdsl-pf1-project-profile-schema.md',
              '''approval_required:=explicit valid approval_ref required before authority can be sufficient''',
              '''approval_required:=structurally valid and trusted-source-verified approval_ref required before authority can be sufficient''',
          )
          replace_once(
              'spec/runtime/kdsl-pf1-project-profile-schema.md',
              '''6. validate approval_ref when required''',
              '''6. validate approval_ref integrity and trusted-source acceptance when required''',
          )
          replace_once(
              'spec/runtime/kdsl-pf1-project-profile-schema.md',
              '''| any operational request | `approval_required` + valid exact approval | preserve request plus PF1 constraints |
| any operational request | `approval_required` + missing/invalid approval | `blocked` |''',
              '''| any operational request | `approval_required` + structurally valid and trusted-source-verified exact approval | preserve request plus PF1 constraints |
| any operational request | `approval_required` + missing/invalid/untrusted approval | `blocked` |''',
          )
          replace_once(
              'spec/runtime/kdsl-pf1-project-profile-schema.md',
              '''approval scope/operation mismatchâ†’blocked''',
              '''approval scope/operation mismatchâ†’blocked
approval source/issuer not independently trustedâ†’blocked''',
          )
          replace_once(
              'spec/runtime/kdsl-pf1-project-profile-schema.md',
              '''approval digest valid != executable
```

Minimum approval reference validity follows the K1 schema.''',
              '''approval digest valid != trusted issuer|executable
```

Minimum approval integrity and trusted-source acceptance follow the K1 schema.''',
          )

          replace_once(
              'spec/lint/kdsl-k1-pf1-lint.md',
              '''- [ ] Digest shape is `sha256:<64 lowercase hex>`.
- [ ] Unknown or duplicate fields are absent.''',
              '''- [ ] Digest shape is `sha256:<64 lowercase hex>`.
- [ ] Digest recomputation substitutes only `IDENTITY.digest` with `sha256:SELF`.
- [ ] Stored `IDENTITY.digest` is not `sha256:SELF`.
- [ ] Unknown or duplicate fields are absent.''',
          )
          replace_once(
              'spec/lint/kdsl-k1-pf1-lint.md',
              '''unsupported canonicalization
unknown/duplicate field''',
              '''unsupported canonicalization
invalid/circular self-digest computation
unknown/duplicate field''',
          )
          replace_once(
              'spec/lint/kdsl-k1-pf1-lint.md',
              '''- [ ] Expiry and revocation are checked.
- [ ] Conversation memory is not used as approval evidence.
- [ ] Approval evidence is not described as executable authorization by itself.''',
              '''- [ ] Expiry and revocation are checked.
- [ ] Issuer/source is independently verified by an explicit trust policy or immutable platform record.
- [ ] Digest match alone is not treated as issuer authenticity.
- [ ] Conversation memory is not used as approval evidence.
- [ ] Approval evidence is not described as executable authorization by itself.''',
          )
          replace_once(
              'spec/lint/kdsl-k1-pf1-lint.md',
              '''expired/revoked approval
missing digest/source''',
              '''expired/revoked approval
missing digest/source
untrusted/unverified issuer or source''',
          )

          replace_once(
              'examples/runtime/k1-pf1-non-executable.example.md',
              '''approval_ref valid != executable
digest match != issuer authenticity proof''',
              '''approval_ref structurally valid != trusted-source accepted|executable
digest match != issuer authenticity proof
untrusted issuer/sourceâ†’authority blocked''',
          )

          replace_once(
              'docs/reviews/kdsl-phase9b-k1-pf1-schema-adoption.md',
              '''## 7. Preserved boundaries''',
              '''## 7. Adoption self-audit corrections

```text
IDENTITY.digest self-reference detected before merge
â†’ canonical digest input substitutes only IDENTITY.digest with `sha256:SELF`
â†’ stored digest is recomputed and compared

approval digest integrity != issuer authenticity
â†’ approval authority requires independent trusted-source verification
â†’ missing/untrusted verification remains blocked
```

These corrections narrow acceptance and add no authority.

## 8. Preserved boundaries''',
          )
          replace_once('docs/reviews/kdsl-phase9b-k1-pf1-schema-adoption.md', '## 8. Not implemented / not proven', '## 9. Not implemented / not proven')

          Path('.github/workflows/phase9b-k1-pf1-corrections.yml').unlink()
          PY
      - name: Run bounded verification
        run: |
          python tools/validator/run_p1_shared_ast_samples.py
          python tools/validator/run_p1_contract_samples.py
          python tools/validator/run_packet_p1_normalization_samples.py
          python tools/validator/run_all_samples.py
      - name: Commit corrected Phase 9B candidate
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Spec: correct Phase 9B identity and approval rules"
          git push origin HEAD:agent/kdsl-phase9b-k1-pf1-schema
