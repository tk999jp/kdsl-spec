name: Phase 1 Closeout

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: phase1-closeout-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  closeout:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/kdsl-common-parser-phase1-closeout-work'
    name: Apply Phase 1 closeout
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out closeout work branch
        uses: actions/checkout@v7
        with:
          ref: agent/kdsl-common-parser-phase1-closeout-work
          fetch-depth: 0

      - name: Apply exact closeout alignment
        run: python .github/scripts/apply_phase1_closeout.py

      - name: Verify unified suite
        run: python tools/validator/run_all_samples.py

      - name: Commit closeout documents
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Docs: close Phase 1 common parser integration"
          git push origin HEAD:agent/kdsl-common-parser-phase1-closeout-work
