name: Phase 8 P1L Shared AST Branch Patch

on:
  push:
    branches:
      - agent/kdsl-phase8-p1l-shared-ast
    paths:
      - .github/workflows/phase8-p1l-shared-ast-patch.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/kdsl-phase8-p1l-shared-ast
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply bounded Phase 8 patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          ROOT = Path('.')

          def read(path):
              return (ROOT / path).read_text(encoding='utf-8')

          def write(path, content):
              target = ROOT / path
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(content, encoding='utf-8')

          def replace_once(path, old, new):
              content = read(path)
              count = content.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one replacement, found {count}: {old!r}')
              write(path, content.replace(old, new, 1))

          replace_once(
              'tools/validator/kdsl_parser_v2.py',
              "KNOWN_ENVELOPES = {\n    'KDSL_RESULT',",
              "KNOWN_ENVELOPES = {\n    'P1L',\n    'KDSL_RESULT',",
          )

          replace_once(
              'tools/validator/kdsl_p1_contract.py',
              """def split_p1_segments(line: str) -> list[tuple[str, str]]:\n    stripped = line.strip()\n    if not stripped.startswith('P1|'):\n        if stripped.startswith('P1|M:') or '|T:' in stripped:\n            raise ValueError('legacy operational P1 colon syntax is not kdsl-p1@0.1-draft')\n        raise ValueError('P1 compact contract must start with P1|')\n""",
              """def split_p1_segments(line: str) -> list[tuple[str, str]]:\n    stripped = line.strip()\n    if stripped.startswith('P1|') and '|SCHEMA=' not in stripped:\n        if re.search(r'(?:^|\\|)[A-Z][A-Z0-9]*:', stripped[3:]):\n            raise ValueError('legacy operational P1 colon syntax is not kdsl-p1@0.1-draft')\n    if not stripped.startswith('P1|'):\n        raise ValueError('P1 compact contract must start with P1|')\n""",
          )

          consumers = (
              'tools/validator/kdsl_p1.py',
              'tools/validator/kdsl_p1l.py',
              'tools/validator/kdsl_p1_auto.py',
              'tools/validator/kdsl_p1_roundtrip.py',
              'tools/validator/run_p1_contract_samples.py',
              'tools/validator/kdsl_packet_normalize_p1.py',
              'tools/validator/kdsl_packet_p1_property.py',
          )
          for path in consumers:
              content = read(path)
              if 'kdsl_p1_bootstrap' not in content:
                  raise SystemExit(f'{path}: bootstrap import not found')
              write(path, content.replace('kdsl_p1_bootstrap', 'kdsl_p1_contract'))

          bootstrap = ROOT / 'tools/validator/kdsl_p1_bootstrap.py'
          if not bootstrap.exists():
              raise SystemExit('bootstrap file missing before migration')
          bootstrap.unlink()

          runner = r'''import sys
          from pathlib import Path

          from kdsl_parser_v2 import DocumentNodeV2, KNOWN_ENVELOPES
          from kdsl_p1_contract import P1L_FIELD_ORDER, parse_contract, render_p1

          ROOT = Path(__file__).resolve().parent
          REPO_ROOT = ROOT.parent.parent
          EXAMPLE = REPO_ROOT / 'examples/adps/p1l-investigate.example.md'
          EXPECTED_CONSUMERS = (
              'kdsl_p1.py',
              'kdsl_p1l.py',
              'kdsl_p1_auto.py',
              'kdsl_p1_roundtrip.py',
              'run_p1_contract_samples.py',
              'kdsl_packet_normalize_p1.py',
              'kdsl_packet_p1_property.py',
          )


          def check(name, condition, detail=''):
              ok = bool(condition)
              print(('PASS' if ok else 'FAIL') + ': ' + name)
              if not ok and detail:
                  print('  ' + detail)
              return ok


          def main():
              results = []
              source_text = EXAMPLE.read_text(encoding='utf-8')
              parsed_contract = parse_contract(source_text, expected='P1L')
              scope = parsed_contract.source_scope or ''

              results.append(check('P1L is registered in shared KNOWN_ENVELOPES', 'P1L' in KNOWN_ENVELOPES))

              raw_document = DocumentNodeV2.parse(scope, context='raw-envelope')
              raw_envelopes = raw_document.envelopes('P1L')
              results.append(
                  check(
                      'shared raw-envelope parser recognizes one P1L envelope',
                      not raw_document.errors and len(raw_envelopes) == 1,
                      repr([issue.format() for issue in raw_document.errors]),
                  )
              )
              results.append(
                  check(
                      'shared P1L field projection preserves canonical order',
                      len(raw_envelopes) == 1
                      and tuple(field.name for field in raw_envelopes[0].fields) == P1L_FIELD_ORDER,
                  )
              )

              active_document = DocumentNodeV2.parse(source_text, context='active-document')
              results.append(
                  check(
                      'active-document markdown fence isolation remains intact',
                      not active_document.envelopes('P1L'),
                  )
              )

              duplicate_document = DocumentNodeV2.parse(scope + '\n' + scope, context='raw-envelope')
              results.append(
                  check(
                      'duplicate shared P1L envelopes are rejected',
                      any(issue.code == 'PARSER_DUPLICATE_ENVELOPE' for issue in duplicate_document.errors),
                  )
              )

              legacy = 'P1|M:contract_rev=0.1,loss=L|T:I|S:scope|G:ro|V:none|X:missing|O:std'
              legacy_result = parse_contract(legacy, expected='P1')
              results.append(
                  check(
                      'legacy colon P1 rejection is owned by canonical contract module',
                      any('legacy operational P1 colon syntax' in error for error in legacy_result.errors),
                      repr(legacy_result.errors),
                  )
              )

              if parsed_contract.model is None:
                  results.append(check('canonical P1 render source is available', False, repr(parsed_contract.errors)))
              else:
                  p1_line = render_p1(parsed_contract.model)
                  p1_document = DocumentNodeV2.parse(p1_line, context='raw-envelope')
                  results.append(
                      check(
                          'P1 compact line is not promoted to an AST envelope',
                          not p1_document.envelopes(),
                      )
                  )

              bootstrap = ROOT / 'kdsl_p1_bootstrap.py'
              results.append(check('checker-local P1 bootstrap module removed', not bootstrap.exists()))

              remaining = []
              for path in ROOT.glob('*.py'):
                  if 'kdsl_p1_bootstrap' in path.read_text(encoding='utf-8'):
                      remaining.append(path.name)
              results.append(check('no bootstrap imports remain', not remaining, repr(remaining)))

              consumer_failures = []
              for name in EXPECTED_CONSUMERS:
                  content = (ROOT / name).read_text(encoding='utf-8')
                  if 'kdsl_p1_contract' not in content:
                      consumer_failures.append(name)
              results.append(
                  check(
                      'all known P1/P1L consumers use canonical contract module',
                      not consumer_failures,
                      repr(consumer_failures),
                  )
              )

              failed = sum(not item for item in results)
              print('SUMMARY:')
              print('  total: ' + str(len(results)))
              print('  failed: ' + str(failed))
              return 1 if failed else 0


          if __name__ == '__main__':
              raise SystemExit(main())
          '''
          runner = '\n'.join(line[10:] if line.startswith('          ') else line for line in runner.splitlines()) + '\n'
          write('tools/validator/run_p1_shared_ast_samples.py', runner)

          replace_once(
              'tools/validator/run_all_samples.py',
              "    ('p1-contract', 'run_p1_contract_samples.py'),\n",
              "    ('p1-contract', 'run_p1_contract_samples.py'),\n    ('p1-shared-ast', 'run_p1_shared_ast_samples.py'),\n",
          )

          design = '''# Phase 8 — Shared AST v2 P1L First-Class Integration

status: implementation-candidate
tracking_issue: 128
base: main@220547f0aa8f5c5ef95dec5387f7942f50fc9511

## Goal

Promote `P1L:` recognition from checker-local mutation into the shared typed AST v2 parser while preserving all non-executable contract boundaries.

## Change

```text
shared KNOWN_ENVELOPES += P1L
legacy colon-P1 detection → kdsl_p1_contract.py
P1/P1L consumers → kdsl_p1_contract imports
kdsl_p1_bootstrap.py → removed
```

## Compatibility requirements

```text
P1L raw-envelope parse remains structurally identical
active-document fenced examples remain inert
P1 compact line remains dedicated-scanner input, not AST envelope
legacy colon P1 remains blocked
Packet P1 normalization/property consumers remain unchanged semantically
```

## Non-executable boundary

```text
P1L AST recognition != executable contract
BINDING.executable:false
Packet remains non-executable/not_normalized
semantic_equivalence:not_proven
execution_authority:none
RT:v/NEXT/COMMIT meanings unchanged
```

## Non-goals

```text
runtime binding
K1/PF1 schema
P1 compact AST redesign
Packet normalized-state promotion
stable/public-ready/tag/release/Release Assets operations
```
'''
          write('docs/design/kdsl-phase8-p1l-shared-ast.md', design)

          notes = read('tools/validator/kdsl-p1-contract-implementation-notes.md')
          notes = notes.replace('status: Phase 7C first slice integrated', 'status: Phase 8 shared AST integration candidate', 1)
          notes = notes.replace(
              """kdsl_p1_bootstrap.py\n  checker-local P1L marker registration into AST v2\n  shared parser core is not modified in the first slice\n""",
              """kdsl_parser_v2.py\n  shared first-class P1L envelope registration\n\nkdsl_p1_contract.py\n  owns legacy colon-P1 rejection without parser-registration side effects\n""",
              1,
          )
          notes = notes.replace(
              """Phase 7C intentionally avoids changing shared AST v2 parser ownership.\n\n```text\nchecker process\n→ kdsl_p1_bootstrap registers P1L marker\n→ DocumentNodeV2 raw-envelope parse\n→ P1L schema-specific model validation\n```\n\nThis bounded registration is transitional. A later parser-integration phase may make P1L a shared first-class envelope only after compatibility and consumer review.\n""",
              """Phase 8 promotes P1L marker recognition into shared AST v2 after compatibility and consumer review.\n\n```text\nshared DocumentNodeV2\n→ recognizes P1L in raw-envelope context\n→ preserves active-document fence isolation\n→ P1L schema-specific model validation remains in kdsl_p1_contract.py\n```\n\nP1 compact serialization remains a dedicated delimiter-aware scanner and is not promoted to an AST envelope.\n""",
              1,
          )
          notes += '''\n## Phase 8 compatibility corpus\n\n```text\nshared P1L marker registration\ncanonical field-order projection\nactive-document fence isolation\nduplicate envelope detection\nlegacy colon-P1 rejection ownership\nP1 compact non-envelope boundary\nbootstrap file/import inventory\nknown consumer migration\n```\n'''
          write('tools/validator/kdsl-p1-contract-implementation-notes.md', notes)

          status = read('docs/project-status.md')
          status = status.replace('phase: phase7-canonical-p1-p1l-contract-complete', 'phase: phase8-p1l-shared-ast-integration-candidate', 1)
          status = status.replace('tracking_issue: 118', 'tracking_issue: 128', 1)
          status = status.replace(
              'Phase 7 canonical P1/P1L contract scope: complete',
              'Phase 7 canonical P1/P1L contract scope: complete\nPhase 8 shared AST v2 P1L first-class integration: candidate',
              1,
          )
          status = status.replace(
              'shared AST v2 P1L marker registration: checker-local bootstrap only',
              'shared AST v2 P1L marker registration: first-class candidate / compatibility corpus required',
              1,
          )
          status = status.replace(
              'P2: shared AST v2 first-class P1L integration only under separate compatibility review\nP3: K1/PF1 canonical runtime-control design only under separate approval',
              'P0: complete Phase 8 shared AST compatibility review and required checks\nP1: K1/PF1 canonical runtime-control design only under separate approval',
              1,
          )
          write('docs/project-status.md', status)

          workflow = ROOT / '.github/workflows/phase8-p1l-shared-ast-patch.yml'
          workflow.unlink()
          PY

      - name: Run targeted compatibility checks
        run: |
          python tools/validator/run_p1_shared_ast_samples.py
          python tools/validator/run_p1_contract_samples.py
          python tools/validator/run_packet_p1_normalization_samples.py

      - name: Commit branch patch
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Validator: integrate P1L into shared AST v2"
          git push origin HEAD:agent/kdsl-phase8-p1l-shared-ast
