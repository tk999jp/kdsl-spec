name: Phase 8 Shared AST Closeout Patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/kdsl-phase8-p1l-shared-ast-closeout
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Synchronize Phase 8 current-state documents
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              target = Path(path)
              content = target.read_text(encoding='utf-8')
              count = content.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one replacement, found {count}: {old!r}')
              target.write_text(content.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'docs/project-status.md',
              'phase: phase8-p1l-shared-ast-integration-candidate',
              'phase: phase8-p1l-shared-ast-integrated-closeout-candidate',
