name: Phase 8 Final Status Trigger

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/kdsl-phase8-final-status
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Execute bounded final-status patch
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/phase8-final-status-run.yml')
          text = source.read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "          PY\n"
          start = text.index(start_marker) + len(start_marker)
          end = text.index(end_marker, start)
          lines = text[start:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          exec(compile(script, str(source), 'exec'), {'__name__': '__main__'})
          trigger = Path('.github/workflows/phase8-final-status-trigger.yml')
          if trigger.exists():
              trigger.unlink()
          PY

      - name: Run bounded final-status verification
        run: |
          python tools/validator/run_p1_shared_ast_samples.py
          python tools/validator/run_p1_contract_samples.py
          python tools/validator/run_packet_p1_normalization_samples.py

      - name: Commit final status
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Docs: finalize Phase 8 project status"
          git push origin HEAD:agent/kdsl-phase8-final-status
