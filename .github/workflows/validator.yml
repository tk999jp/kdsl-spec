name: Validator CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: validator-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  samples:
    name: Sample expectations
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Show Python version
        run: python --version

      - name: Run validator samples
        run: python tools/validator/run_samples.py

  packet_ownership_apply:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/kdsl-packet-ownership'
    name: Apply Packet ownership alignment
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out ownership branch
        uses: actions/checkout@v7
        with:
          ref: agent/kdsl-packet-ownership
          fetch-depth: 0

      - name: Apply exact asserted alignment
        run: python .github/scripts/apply_packet_ownership.py

      - name: Restore read-only workflow and commit alignment
        shell: bash
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/validator.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Spec: adopt Packet v2-draft ownership alignment"
          git push origin HEAD:agent/kdsl-packet-ownership
