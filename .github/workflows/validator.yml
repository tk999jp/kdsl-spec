name: KDSL Validation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kdsl-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phase4-property-fix:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/kdsl-phase4-packet-semantic-property'
    name: Apply Phase 4 property section fix
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out Phase 4 branch
        uses: actions/checkout@v7
        with:
          ref: agent/kdsl-phase4-packet-semantic-property

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Apply section-scoped property fix
        run: python .github/scripts/apply_phase4_property_section_fix.py

      - name: Verify Packet semantic/property suite
        run: python tools/validator/run_packet_semantic_property_samples.py

      - name: Commit verified fix
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm .github/scripts/apply_phase4_property_section_fix.py
          git add tools/validator/kdsl_packet_property.py .github/scripts/apply_phase4_property_section_fix.py
          git commit -m "Validator: scope Packet preview property checks"
          git push origin HEAD:agent/kdsl-phase4-packet-semantic-property
