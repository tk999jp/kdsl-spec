name: Validator CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: validator-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  samples:
    name: Sample expectations
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Show Python version
        run: python --version

      - name: Run validator samples
        run: python tools/validator/run_samples.py

  r1c_ownership_apply:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/kdsl-r1c-ownership'
    name: Apply R1C ownership alignment
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out ownership branch
        uses: actions/checkout@v7
        with:
          ref: agent/kdsl-r1c-ownership
          fetch-depth: 0

      - name: Execute asserted alignment script from branch
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import traceback

          workflow = Path('.github/workflows/r1c-ownership-apply.yml')

          def replace_exact(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected exactly one match, got {count}: {old!r}')
              p.write_text(text.replace(old, new), encoding='utf-8')

          try:
              for target in (
                  'spec/manifest.md',
                  'spec/bridge/kdsl-cp-packet-bridge.md',
                  'spec/glossary-v2-draft.md',
                  'docs/project-status.md',
                  'README.md',
                  'CHANGELOG.md',
              ):
                  path = Path(target)
                  text = path.read_text(encoding='utf-8')
                  path.write_text(text.replace('\r\n', '\n'), encoding='utf-8')

              text = workflow.read_text(encoding='utf-8')
              start_marker = "          python - <<'PY'\n"
              end_marker = "\n          PY\n\n      - name: Commit aligned documents"
              start = text.index(start_marker) + len(start_marker)
              end = text.index(end_marker, start)
              lines = text[start:end].splitlines()
              code = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines)

              code, removed = re.subn(
                  r"\n# CHANGELOG\.md\n.*?(?=\nPath\('docs/reviews/kdsl-r1c-ownership-integration\.md'\))",
                  '',
                  code,
                  flags=re.S,
              )
              if removed != 1:
                  raise SystemExit(f'embedded CHANGELOG block removal count: {removed}')

              exec(compile(code, str(workflow), 'exec'), {'__name__': '__main__'})

              replace_exact(
                  'CHANGELOG.md',
                  '### Added\n\n#### R1C compact-result design candidate',
                  '''### Added

#### R1C v2-draft ownership alignment

- Adopted `kdsl-r1c@0.1-draft` as a v2-draft compact serialization profile subordinate to canonical R1.
- Kept `spec/r1/r1-result-spec.md` as the canonical R1 authority.
- Aligned manifest, CP-Packet Bridge, v2 glossary, README, and project status.
- Kept all canonical R1 field names and RT/NEXT/COMMIT meanings unchanged.
- Kept short aliases, required-field omission, and implicit defaults prohibited.
- Kept Full R1 fallback required when reversible expansion cannot be guaranteed.
- R1C adoption does not make KDSL-Packet executable.

#### R1C compact-result design candidate''',
              )
              replace_exact(
                  'CHANGELOG.md',
                  '''R1C schema:=kdsl-r1c@0.1-draft design candidate
R1C canonical/stable adoption:=no
R1C manifest/Bridge/glossary promotion:=pending
KDSL-Packet:=draft-non-executable
Packet schema/BASE/TASK/FLOW registry/Packet lint:=undefined''',
                  '''R1C:=kdsl-r1c@0.1-draft / v2-draft adopted serialization profile
R1C independent canonical/stable status:=no
R1C manifest/Bridge/glossary alignment:=integrated
KDSL-Packet:=draft-non-executable
Packet schema/BASE/TASK/FLOW registry/Packet lint:=undefined''',
              )
          except BaseException:
              Path('/tmp/r1c-ownership-error.txt').write_text(traceback.format_exc(), encoding='utf-8')
              raise
          PY

      - name: Upload failure diagnostic
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: r1c-ownership-error-${{ github.run_id }}
          path: /tmp/r1c-ownership-error.txt
          if-no-files-found: error
          retention-days: 1

      - name: Fail after diagnostic upload
        if: steps.apply.outcome == 'failure'
        run: exit 1

      - name: Commit aligned documents
        if: steps.apply.outcome == 'success'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Spec: adopt R1C v2-draft ownership alignment"
          git push origin HEAD:agent/kdsl-r1c-ownership
