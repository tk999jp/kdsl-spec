name: Validator CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validator-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  samples:
    name: Sample expectations
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Show Python version
        run: python --version

      - name: Run validator samples
        run: python tools/validator/run_samples.py

      - name: Run Safety Gate extension samples
        run: python tools/validator/run_safety_gate_samples.py

      - name: Run R1C round-trip property samples
        run: python tools/validator/run_r1c_roundtrip_samples.py
