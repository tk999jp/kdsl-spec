name: KDSL Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kdsl-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validation:
    name: KDSL Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Show Python version
        run: python --version

      - name: Capture adapter readiness diagnostics
        shell: bash
        run: |
          set +e
          python tools/validator/run_parser_adapter_retirement_readiness_samples.py > adapter-readiness.log 2>&1
          printf '%s\n' "$?" > adapter-readiness.exit
          exit 0

      - name: Upload adapter readiness diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: adapter-readiness-diagnostics
          path: |
            adapter-readiness.log
            adapter-readiness.exit
          if-no-files-found: error
          retention-days: 1

      - name: Run unified validator suite
        run: python tools/validator/run_all_samples.py

  packet-semantic-property:
    name: Packet Semantic Property
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run Packet semantic/property suite
        run: python tools/validator/run_packet_semantic_property_samples.py
