name: KDSL Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  kdsl-validation:
    name: KDSL Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile validators
        run: python -m compileall -q tools/validator
      - name: Validate KDSL identity
        run: python tools/validator/kdsl_identity_lint.py
      - name: Validate Agent contract
        run: python tools/validator/kdsl_agent_lint.py examples/kanji/agent-codex-run.kdsl.md
      - name: Validate Agent operational scenarios
        run: python tools/validator/kdsl_agent_operational_regression.py
      - name: Validate RunChanged with Git repository
        run: python tools/validator/kdsl_run_changed_git_regression.py
      - name: Run canonical regression corpus
        run: python tools/validator/run_canonical_samples.py
