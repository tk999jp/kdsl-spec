name: Validator CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: validator-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  samples:
    name: Sample expectations
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run validator samples
        run: python tools/validator/run_samples.py

  closeout_apply:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/kdsl-packet-normalization-validator-closeout-work'
    name: Apply Packet normalization validator closeout
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out work branch
        uses: actions/checkout@v7
        with:
          ref: agent/kdsl-packet-normalization-validator-closeout-work
          fetch-depth: 0
      - name: Apply exact closeout
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          python .github/scripts/apply_packet_normalization_validator_closeout.py > /tmp/normalization-validator-closeout.log 2>&1
      - name: Upload diagnostic
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: normalization-validator-closeout-error-${{ github.run_id }}
          path: /tmp/normalization-validator-closeout.log
          if-no-files-found: error
          retention-days: 1
      - name: Fail after diagnostic upload
        if: steps.apply.outcome == 'failure'
        run: exit 1
      - name: Restore read-only workflow and commit
        if: steps.apply.outcome == 'success'
        shell: bash
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/validator.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Docs: close Packet normalization validator integration"
          git push origin HEAD:agent/kdsl-packet-normalization-validator-closeout-work
