name: Phase 1 Parser Integration

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: phase1-parser-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: Phase 1 Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run unified suite before adapters
        run: python tools/validator/run_all_samples.py

  apply:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/kdsl-common-parser-phase1-work'
    name: Apply Phase 1 parser adapters
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out work branch
        uses: actions/checkout@v7
        with:
          ref: agent/kdsl-common-parser-phase1-work
          fetch-depth: 0

      - name: Apply exact adapter integration
        run: python .github/scripts/apply_phase1_parser.py

      - name: Verify adapter tree
        run: python tools/validator/run_all_samples.py

      - name: Commit adapter integration
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Validator: integrate common parser adapters"
          git push origin HEAD:agent/kdsl-common-parser-phase1-work
