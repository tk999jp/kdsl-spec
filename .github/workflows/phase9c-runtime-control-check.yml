name: Phase 9C Runtime Control Check

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/kdsl-phase9c-k1-pf1-validator
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Prepare shared parser candidate
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tools/validator/kdsl_parser_v2.py')
          text = path.read_text(encoding='utf-8')
          old = "KNOWN_ENVELOPES = {\n    'P1L',"
          new = "KNOWN_ENVELOPES = {\n    'P1L',\n    'K1',\n    'PF1',"
          if text.count(old) != 1:
              raise SystemExit('unexpected parser registration point')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Validate candidate
        run: |
          python -m py_compile tools/validator/kdsl_runtime_control.py
          python tools/validator/run_runtime_control_samples.py
          python tools/validator/run_p1_shared_ast_samples.py
          python tools/validator/run_all_samples.py
      - name: Store validated parser registration
        run: |
          rm .github/workflows/phase9c-runtime-control-check.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tools/validator/kdsl_parser_v2.py .github/workflows/phase9c-runtime-control-check.yml
          git commit -m "Validator: register K1 PF1 shared AST envelopes"
          git push origin HEAD:agent/kdsl-phase9c-k1-pf1-validator
