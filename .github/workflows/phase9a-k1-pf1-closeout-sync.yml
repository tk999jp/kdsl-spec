name: Phase 9A K1 PF1 Closeout Sync

# Synchronize after the workflow is present on the PR branch.
on:
  pull_request:
    branches:
      - main
    types:
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/kdsl-phase9a-k1-pf1-design-closeout
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Synchronize Phase 9A operational status
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/project-status.md')
          content = path.read_text(encoding='utf-8')

          def replace_once(old: str, new: str) -> None:
              global content
              count = content.count(old)
              if count != 1:
                  raise SystemExit(f'expected one replacement, found {count}: {old!r}')
              content = content.replace(old, new, 1)

          replace_once(
              'phase: phase8-p1l-shared-ast-complete',
              'phase: phase9a-k1-pf1-runtime-control-design-complete',
          )
          replace_once('tracking_issue: 128', 'tracking_issue: 132')
          replace_once(
              'verified_main_head: cdb907d139bf562bc6cca9c4fdb436d12d802ea6',
              'verified_main_head: d65c6eae6947b251246946bfafb9e51636efb145',
          )
          replace_once(
              'Phase 8 shared AST v2 P1L first-class integration: complete\n',
              'Phase 8 shared AST v2 P1L first-class integration: complete\nPhase 9A K1/PF1 runtime-control design: complete\n',
          )
          replace_once(
              '## 6. Latest verified implementation',
              '## 6. Latest verified design / implementation',
          )
          replace_once(
              '''Phase 8 closeout proof:

```text''',
              '''Phase 9A design proof:

```text
PR: 133
source head: b0ec16600686b1b372ab71236df794e03ee23267
squash commit: d65c6eae6947b251246946bfafb9e51636efb145
workflow run: 29630096451 / #465
KDSL Validation: success
Packet Semantic Property: success
Packet P1 Normalization Property: success
scope: design documents only
```

Phase 8 closeout proof:

```text''',
          )
          replace_once(
              'K1/PF1 canonical schema: absent',
              'K1/PF1 canonical schema: absent / Phase 9A design integrated',
          )
          replace_once(
              'Packet→P1L/P1 non-executable preview normalization first slice\nexperimental heuristic validator helpers',
              'Packet→P1L/P1 non-executable preview normalization first slice\nK1/PF1 non-executable runtime-control design\nexperimental heuristic validator helpers',
          )
          replace_once(
              'P1L/P1 executable runtime contract\nPacket normalized/executable runtime contract',
              'P1L/P1 executable runtime contract\ncanonical K1/PF1 runtime-control schema\nPacket normalized/executable runtime contract',
          )
          replace_once(
              '''P0: close tracking issue #128 after final-status PR merge
P1: K1/PF1 canonical runtime-control design only under separate approval
Hold: runtime binding/executable promotion/stable/public-ready/tag/release/Release Assets''',
              '''P0: resolve the five Phase 9B schema decisions under separate approval
P1: canonical K1/PF1 schema/lint/examples only under separate approval
Hold: runtime binding/executable promotion/stable/public-ready/tag/release/Release Assets''',
          )

          path.write_text(content, encoding='utf-8')
          Path('.github/workflows/phase9a-k1-pf1-closeout-sync.yml').unlink()
          PY

      - name: Run bounded verification
        run: |
          python tools/validator/run_p1_shared_ast_samples.py
          python tools/validator/run_p1_contract_samples.py
          python tools/validator/run_packet_p1_normalization_samples.py

      - name: Commit closeout status
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Docs: synchronize Phase 9A closeout status"
          git push origin HEAD:agent/kdsl-phase9a-k1-pf1-design-closeout
