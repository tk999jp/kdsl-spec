name: Phase 9D Closeout Sync

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'phase9d-binding-closeout'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: phase9d-binding-closeout
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Apply closeout alignment
        run: python tools/validator/tmp_phase9d_closeout.py
      - name: Validate repository
        run: python tools/validator/run_all_samples.py
      - name: Store closeout state
        run: |
          rm .github/workflows/phase9d-closeout-sync.yml
          rm tools/validator/tmp_phase9d_closeout.py
          rm .phase9d-closeout-trigger
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Docs: close Phase 9D binding evidence schema"
          git push origin HEAD:phase9d-binding-closeout
