name: Phase 9C Closeout Clean

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  closeout:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/kdsl-phase9c-closeout-clean
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Synchronize status files
        run: python tools/validator/phase9c_closeout_sync.py
      - name: Validate synchronized tree
        run: |
          python tools/validator/run_runtime_control_samples.py
          python tools/validator/run_all_samples.py
      - name: Store synchronized closeout
        run: |
          rm .github/workflows/phase9c-closeout-clean.yml
          rm tools/validator/phase9c_closeout_sync.py
          rm -f docs/reviews/.phase9c-closeout-clean-trigger
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Docs: close Phase 9C validator first slice"
          git push origin HEAD:agent/kdsl-phase9c-closeout-clean
